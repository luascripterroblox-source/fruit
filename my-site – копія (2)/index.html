<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Harvests - Coming June 22</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Фоновий контейнер з картинкою */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
            /* Put your image path here */
            background-image: url('background.png');
        }

        /* Затемнення для кращої читаності */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* Контейнер таймера */
        .timer-container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
        }

        h1 {
            color: #ffffff;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            font-weight: 900;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-value {
            font-size: 72px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            min-width: 120px;
            line-height: 1;
        }

        .time-label {
            font-size: 18px;
            color: #ffffff;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .description {
            color: #ffffff;
            font-size: 20px;
            margin-top: 20px;
            line-height: 1.6;
            font-weight: 900;
        }

        /* Адаптив для мобільних */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
                margin-bottom: 20px;
            }

            .timer-container {
                padding: 40px;
            }

            .timer {
                gap: 15px;
            }

            .time-value {
                font-size: 48px;
                min-width: 80px;
            }

            .time-label {
                font-size: 14px;
            }

            .description {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="timer-container">
        <h1>⏳ FRUIT HARVESTS RELEASES IN</h1>
        
        <div class="timer">
            <div class="time-unit">
                <div class="time-value" id="days">0</div>
                <div class="time-label">Days</div>
            </div>
            <div class="time-unit">
                <div class="time-value" id="hours">0</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="time-unit">
                <div class="time-value" id="minutes">0</div>
                <div class="time-label">Minutes</div>
            </div>
            <div class="time-unit">
                <div class="time-value" id="seconds">0</div>
                <div class="time-label">Seconds</div>
            </div>
        </div>

        <div class="description">
            Coming June 22
        </div>
    </div>

    <script>
        function updateTimer() {
            // Set target date - June 22 this year
            let targetDate = new Date(new Date().getFullYear(), 5, 22).getTime();
            
            // If date has passed, set to next year
            if (targetDate < new Date().getTime()) {
                targetDate = new Date(new Date().getFullYear() + 1, 5, 22).getTime();
            }

            const now = new Date().getTime();
            const difference = targetDate - now;

            // Calculate time
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Update DOM
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // If time is up
            if (difference <= 0) {
                document.querySelector('.description').textContent = '🎉 Fruit Harvests is LIVE! 🎉';
                document.querySelector('h1').textContent = 'AVAILABLE NOW!';
            }
        }

        // Update timer every second
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
